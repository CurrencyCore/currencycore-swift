name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Distribution is via Swift Package Manager directly from this git repo — a
# pushed `v*` tag is the release; no package registry. Consumers add
# `.package(url: "https://github.com/CurrencyCore/currencycore-swift", from: "0.1.0")`.
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift build
